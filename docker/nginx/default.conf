server {
    listen 80;
    server_name localhost;
    root /var/www/html;
    index index.html index.htm index.php;

    client_max_body_size 10m;
    charset utf-8;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://www.googletagmanager.com https://www.google-analytics.com https://tagmanager.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://tagmanager.google.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https://images.unsplash.com https://www.google-analytics.com https://www.googletagmanager.com data:; connect-src 'self' https://www.google-analytics.com https://region1.google-analytics.com https://www.googletagmanager.com https://tagassistant.google.com; frame-src https://www.googletagmanager.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

    types {
        text/html html htm;
        application/json json;
        application/xml xml;
        application/manifest+json webmanifest;
        image/svg+xml svg svgz;
    }
    default_type application/octet-stream;

    location = /landing-master.html {
        return 410;
    }

    location = /test-include.html {
        return 410;
    }

    location = /index.backup-2026-02-24.html {
        return 410;
    }

    location = /services.backup-2026-02-24.html {
        return 410;
    }

    location = /service/master-zamene-dvernyh.html {
        return 301 /service/zamena/zamena-dvernyh-zamkov.html;
    }

    location = /service/remont/masterskaya-remontu-zamkov.html {
        return 301 /service/remont/remont-zamkov-dvernyh.html;
    }

    location = /service/sluzhba-vskrytiyu-zamkov.html {
        return 301 /service/vskrytie/avariynoe-vskrytie-zamkov.html;
    }

    location = /service/vyzvat-mastera-vskrytiyu.html {
        return 301 /service/vskrytie/avariynoe-vskrytie-zamkov.html;
    }

    location = /service/zamena/zamena-zamkov-spb.html {
        return 301 /service/zamena/zamena-dvernyh-zamkov.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param HTTP_PROXY "";
        fastcgi_pass php:9000;
        fastcgi_index index.php;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
